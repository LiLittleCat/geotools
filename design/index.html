<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GeoTools — Geometry Visualizer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.17.0/dist/leaflet-geoman.css" />

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.17.0/dist/leaflet-geoman.min.js"></script>
<script src="https://unpkg.com/wellknown@0.5.0/wellknown.js"></script>
<script src="https://unpkg.com/proj4@2.11.0/dist/proj4.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root, :root[data-theme="dark"] {
    --bg-0: #0e0f0d;
    --bg-panel: #171916;
    --bg-elev: #1c1e1b;
    --bg-input: #0a0b09;
    --border: #2a2d28;
    --border-soft: #22251f;
    --border-strong: #3a3e36;
    --fg: #e8e9e3;
    --fg-2: #a8ada0;
    --fg-3: #6b6f64;
    --fg-4: #4a4d45;
    --danger: #e58271;
    --danger-bg: #2a1815;
    --success: #9bc48a;
    --accent: #c9ceb8;
    --tile-filter: invert(1) hue-rotate(180deg) brightness(0.85) saturate(0.55) contrast(1.05);
    --map-bg: #0e0f0d;
    --overlay-bg: rgba(28,30,27,0.92);
  }
  :root[data-theme="light"] {
    --bg-0: #fafaf7;
    --bg-panel: #ffffff;
    --bg-elev: #ffffff;
    --bg-input: #f5f5f0;
    --border: #e2e2dc;
    --border-soft: #ebebe4;
    --border-strong: #cfcfc6;
    --fg: #1a1b18;
    --fg-2: #4a4d45;
    --fg-3: #82867a;
    --fg-4: #b4b8ac;
    --danger: #b83d27;
    --danger-bg: #fbe8e3;
    --success: #4a7d3a;
    --accent: #3a3e36;
    --tile-filter: none;
    --map-bg: #e9eae4;
    --overlay-bg: rgba(255,255,255,0.92);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    overflow: hidden;
    background: var(--bg-0);
    color: var(--fg);
    font-family: 'Geist', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 13px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  #root { height: 100vh; display: flex; flex-direction: column; }

  /* Topbar (two-row app header) */
  .app-header {
    display: flex; flex-direction: column;
    background: var(--bg-0); flex-shrink: 0; z-index: 500;
    border-bottom: 1px solid var(--border-soft);
  }
  .header-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; height: 44px;
  }
  .header-row.tabs-row {
    height: 38px; padding-top: 0; padding-bottom: 0;
    border-top: 1px solid var(--border-soft);
    background: var(--bg-panel);
  }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; letter-spacing: -0.01em; }
  .brand-mark {
    width: 22px; height: 22px; border: 1.5px solid var(--fg);
    border-radius: 4px; position: relative; display: grid; place-items: center;
  }
  .brand-mark::before {
    content: ''; position: absolute; width: 8px; height: 8px;
    border: 1.5px solid var(--fg); border-radius: 50%; background: var(--bg-0);
  }
  .brand-sub { color: var(--fg-3); font-family: 'JetBrains Mono', monospace; font-size: 11px; margin-left: 4px; font-weight: 400; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .header-meta {
    display: flex; gap: 8px; align-items: center;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--fg-3);
  }
  .header-meta .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 0 3px color-mix(in oklab, var(--success) 20%, transparent); }
  .theme-toggle {
    display: flex; gap: 1px; padding: 2px; background: var(--bg-input); border: 1px solid var(--border-soft); border-radius: 6px;
  }
  .theme-toggle button {
    background: transparent; border: none; color: var(--fg-3);
    width: 24px; height: 22px; border-radius: 4px; cursor: pointer;
    display: grid; place-items: center; transition: color 120ms, background 120ms;
  }
  .theme-toggle button:hover { color: var(--fg); }
  .theme-toggle button.active { background: var(--bg-elev); color: var(--fg); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }

  .tabs { display: flex; gap: 4px; height: 100%; align-items: stretch; }
  .tab {
    background: transparent; border: none; color: var(--fg-3);
    font-family: inherit; font-size: 13px; font-weight: 500;
    padding: 0 16px; cursor: pointer;
    letter-spacing: -0.005em;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 120ms, border-color 120ms;
  }
  .tab:hover { color: var(--fg); }
  .tab.active { color: var(--fg); border-bottom-color: var(--accent); }

  /* Converter */
  .conv-split { grid-template-columns: 460px 1fr; }
  .conv-main { display: flex; flex-direction: column; min-height: 0; background: var(--bg-0); }

  /* Left side — mode picker + scrollable body */
  .conv-mode-bar {
    padding: 14px 14px 12px; border-bottom: 1px solid var(--border-soft);
    background: var(--bg-panel); flex-shrink: 0;
  }
  .conv-mode-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .conv-mode-picker { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .conv-mode-btn {
    background: var(--bg-input); border: 1px solid var(--border-soft);
    padding: 10px 12px; border-radius: 7px; cursor: pointer; text-align: left;
    font-family: inherit; color: var(--fg-2);
    transition: border-color 120ms, background 120ms, color 120ms;
  }
  .conv-mode-btn:hover { border-color: var(--border-strong); color: var(--fg); }
  .conv-mode-btn.active {
    background: var(--bg-elev); border-color: var(--fg); color: var(--fg);
    box-shadow: 0 0 0 3px color-mix(in oklab, var(--fg) 10%, transparent);
  }
  .conv-mode-title { display: flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 600; letter-spacing: -0.005em; }
  .conv-mode-desc { font-size: 10.5px; color: var(--fg-3); font-family: 'JetBrains Mono', monospace; margin-top: 3px; }

  .conv-side-body {
    flex: 1 1 0; min-height: 0; overflow-y: auto;
    padding: 14px; display: flex; flex-direction: column; gap: 14px;
  }
  .conv-field {
    background: var(--bg-panel);
    border: 1px solid var(--border-soft); border-radius: 8px;
    padding: 10px 12px 12px;
  }
  .conv-field-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px; gap: 8px;
  }
  .conv-field-head label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.1em;
  }
  .conv-parse-status {
    margin-top: 8px; font-size: 11px; color: var(--fg-3);
    font-family: 'JetBrains Mono', monospace;
  }
  .conv-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
    padding: 2px 6px; border-radius: 3px;
    background: var(--accent); color: var(--bg-0);
    letter-spacing: 0.05em;
  }

  /* Output area */
  .conv-output-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid var(--border-soft);
    background: var(--bg-panel);
  }
  .conv-output-label {
    display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--fg-2);
  }
  .conv-output-label > svg { color: var(--fg-3); }
  .conv-crs-pill {
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
    padding: 2px 7px; border-radius: 10px;
    background: var(--bg-input); border: 1px solid var(--border-soft);
    color: var(--fg-2);
  }
  .conv-output-format { display: flex; align-items: center; gap: 8px; }
  .conv-format-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.1em;
  }
  .seg {
    display: inline-flex; border: 1px solid var(--border-soft); border-radius: 5px;
    overflow: hidden; background: var(--bg-input);
  }
  .seg button {
    background: transparent; border: none; color: var(--fg-3);
    font: inherit; font-size: 11px; padding: 4px 10px;
    cursor: pointer; letter-spacing: -0.005em;
  }
  .seg button:hover { color: var(--fg); }
  .seg button.active { background: var(--fg); color: var(--bg-0); }

  .conv-output-wrap { position: relative; height: 280px; min-height: 180px; border-bottom: 1px solid var(--border-soft); flex-shrink: 0; }
  .conv-map-wrap { display: flex; flex-direction: column; flex: 1; min-height: 0; }
  .conv-map-title {
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
    color: var(--fg-3); background: var(--bg-panel);
    border-bottom: 1px solid var(--border-soft);
  }
  .conv-map-inner { flex: 1; min-height: 0; position: relative; background: var(--map-bg); }

  /* Origin / utm rows */
  .conv-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 4px 0; }
  .conv-row label { font-size: 11.5px; color: var(--fg-2); min-width: 60px; }
  .conv-row input, .conv-row select {
    background: var(--bg-input); border: 1px solid var(--border); color: var(--fg);
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    padding: 4px 7px; border-radius: 4px; outline: none; width: 150px;
  }
  .conv-row .opt { display: inline-flex; border: 1px solid var(--border-soft); border-radius: 5px; overflow: hidden; background: var(--bg-input); }
  .conv-row .opt button { background: transparent; border: none; color: var(--fg-3); padding: 3px 8px; font: inherit; font-size: 10.5px; cursor: pointer; }
  .conv-row .opt button:hover { color: var(--fg); }
  .conv-row .opt button.active { background: var(--fg); color: var(--bg-0); }
  .conv-hint { font-size: 10.5px; color: var(--fg-3); font-family: 'JetBrains Mono', monospace; margin-top: 8px; line-height: 1.45; padding: 6px 8px; background: var(--bg-input); border-radius: 4px; border-left: 2px solid var(--accent); }

  .crs-select {
    background: var(--bg-input); color: var(--fg-2);
    border: 1px solid var(--border-soft); border-radius: 5px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 4px 8px;
    cursor: pointer;
  }
  .crs-select:hover { color: var(--fg); border-color: var(--border-strong); }
  .crs-select.block { width: 100%; }
  .crs-select.sm { font-size: 10.5px; padding: 2px 6px; max-width: 200px; }

  /* Split */
  .split { display: grid; grid-template-columns: 420px 1fr; flex: 1; min-height: 0; }
  @media (max-width: 860px) { .split { grid-template-columns: 1fr; grid-template-rows: auto 1fr; } }

  /* Side */
  .side { border-right: 1px solid var(--border-soft); display: flex; flex-direction: column; min-height: 0; height: 100%; overflow: hidden; background: var(--bg-0); }
  .side-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; border-bottom: 1px solid var(--border-soft); flex-shrink: 0;
  }
  .side-title { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; }
  .side-actions { display: flex; gap: 6px; }
  .side-scroll {
    flex: 1 1 0;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .side-scroll > * { flex-shrink: 0; }
  .side-scroll::-webkit-scrollbar { width: 8px; }
  .side-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Panel card */
  .panel {
    border: 1px solid var(--border-soft);
    border-radius: 8px;
    background: var(--bg-elev);
    overflow: hidden;
    transition: border-color .15s ease;
  }
  .panel.focused { border-color: var(--border-strong); }
  .panel.errored { border-color: color-mix(in oklab, var(--danger) 40%, var(--border)); }
  .panel.locked .panel-body { background: var(--bg-input); position: relative; }
  .panel.locked textarea { opacity: 0.75; cursor: not-allowed; }

  .panel-head {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px; border-bottom: 1px solid var(--border-soft);
  }
  .swatch {
    width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 0 0 2px var(--bg-elev), 0 0 0 3px var(--_c);
    background: var(--_c);
  }
  .panel-name { font-weight: 500; font-size: 13px; flex: 1; min-width: 0; letter-spacing: -0.005em; }
  .panel-name input {
    background: transparent; border: none; color: var(--fg);
    font: inherit; width: 100%; outline: none; padding: 2px 0;
  }
  .panel-name input:focus {
    background: var(--bg-input); padding: 2px 6px; margin: -2px -6px; border-radius: 4px;
  }
  .panel-name input:disabled { cursor: not-allowed; }
  .meta {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--fg-3); padding: 2px 6px;
    border: 1px solid var(--border); border-radius: 3px;
    background: var(--bg-0); text-transform: uppercase; letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .meta.err { color: var(--danger); border-color: color-mix(in oklab, var(--danger) 40%, var(--border)); background: var(--danger-bg); }
  .meta.ok { color: var(--_c); border-color: color-mix(in oklab, var(--_c) 40%, var(--border)); }
  .meta.src { color: var(--fg-3); }

  .panel-body { position: relative; }
  .copy-btn {
    position: absolute; top: 6px; right: 8px;
    background: var(--bg-elev); border: 1px solid var(--border-soft);
    color: var(--fg-3); border-radius: 4px;
    width: 22px; height: 22px; padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; opacity: 0.7; transition: all .12s ease;
  }
  .panel-body:hover .copy-btn, .copy-btn:focus { opacity: 1; }
  .copy-btn:hover { color: var(--fg); border-color: var(--border-strong); }
  .copy-btn svg { width: 11px; height: 11px; }
  textarea.geom-input {
    width: 100%; min-height: 104px; max-height: 260px;
    resize: vertical; background: var(--bg-input);
    border: none; color: var(--fg);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px; line-height: 1.55;
    padding: 10px 12px; outline: none; display: block;
    tab-size: 2; caret-color: var(--_c);
  }
  textarea.geom-input::placeholder { color: var(--fg-4); }
  textarea.geom-input::-webkit-scrollbar { width: 8px; height: 8px; }
  textarea.geom-input::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .panel-foot {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 10px; border-top: 1px solid var(--border-soft);
    background: var(--bg-0); gap: 8px; min-height: 34px;
  }
  .panel-foot-left {
    display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
    color: var(--fg-3); flex: 1; min-width: 0;
  }
  .panel-foot-left strong { color: var(--fg-2); font-weight: 500; }
  .err-msg {
    color: var(--danger); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; min-width: 0;
  }

  /* Buttons */
  .btn {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--fg-2);
    font-family: inherit; font-size: 12px; font-weight: 500;
    padding: 5px 10px; border-radius: 5px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 5px;
    transition: all .12s ease; letter-spacing: -0.005em;
  }
  .btn:hover { background: var(--bg-0); color: var(--fg); border-color: var(--border-strong); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn.primary { background: var(--fg); color: var(--bg-0); border-color: var(--fg); }
  .btn.primary:hover { background: var(--accent); border-color: var(--accent); }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--fg-3); }
  .btn.ghost:hover { color: var(--fg); background: var(--bg-elev); }
  .btn.sm { padding: 3px 7px; font-size: 11px; }
  .btn.icon { padding: 4px; width: 26px; height: 26px; justify-content: center; }
  .btn svg { width: 13px; height: 13px; }
  .btn.active { background: var(--fg); color: var(--bg-0); border-color: var(--fg); }

  /* Map */
  .map-wrap { position: relative; min-height: 0; background: var(--bg-0); display: flex; flex-direction: column; }
  .map-toolbar {
    display: flex; align-items: center; gap: 4px;
    padding: 8px 10px; border-bottom: 1px solid var(--border-soft);
    background: var(--bg-0); flex-shrink: 0; z-index: 500;
  }
  .tool-group { display: flex; gap: 2px; padding: 2px; background: var(--bg-input); border: 1px solid var(--border-soft); border-radius: 6px; }
  .tool-btn {
    background: transparent; border: none; color: var(--fg-2);
    padding: 5px 9px; border-radius: 4px; cursor: pointer;
    font-family: inherit; font-size: 11.5px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 5px;
    transition: all .1s ease;
  }
  .tool-btn:hover { background: var(--bg-elev); color: var(--fg); }
  .tool-btn.active { background: var(--fg); color: var(--bg-0); }
  .tool-btn svg { width: 13px; height: 13px; }
  .tool-sep { width: 1px; height: 18px; background: var(--border-soft); margin: 0 4px; }
  .tool-hint {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; color: var(--fg-3);
  }
  .map-inner { position: relative; flex: 1; min-height: 0; }
  #map { position: absolute; inset: 0; background: var(--map-bg); }

  .leaflet-container { background: var(--map-bg); font-family: 'JetBrains Mono', monospace; font-size: 10.5px; }
  .leaflet-tile-pane { filter: var(--tile-filter); }
  .leaflet-control-attribution {
    background: var(--overlay-bg) !important; color: var(--fg-3) !important;
    border: 1px solid var(--border-soft); backdrop-filter: blur(4px);
  }
  .leaflet-control-attribution a { color: var(--fg-2) !important; }
  .leaflet-control-zoom {
    border: 1px solid var(--border-soft) !important;
    box-shadow: none !important; border-radius: 6px !important; overflow: hidden;
  }
  .leaflet-control-zoom a {
    background: var(--bg-elev) !important; color: var(--fg-2) !important;
    border-bottom: 1px solid var(--border-soft) !important;
    width: 28px !important; height: 28px !important; line-height: 28px !important; font-size: 16px !important;
  }
  .leaflet-control-zoom a:hover { background: var(--bg-0) !important; color: var(--fg) !important; }
  .leaflet-popup-content-wrapper, .leaflet-popup-tip {
    background: var(--bg-elev) !important; color: var(--fg) !important;
    border: 1px solid var(--border) !important;
  }
  /* Hide geoman's toolbar — we have our own */
  .leaflet-pm-toolbar { display: none !important; }

  /* Map overlays */
  .map-overlay-tl, .map-overlay-bl, .map-overlay-tr {
    position: absolute; z-index: 400; pointer-events: none;
  }
  .map-overlay-tl { top: 12px; left: 12px; }
  .map-overlay-bl { bottom: 24px; left: 12px; }
  .map-overlay-tr { top: 12px; right: 12px; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
  .map-overlay-tl > *, .map-overlay-bl > *, .map-overlay-tr > * { pointer-events: auto; }

  .legend {
    background: var(--overlay-bg); backdrop-filter: blur(8px);
    border: 1px solid var(--border-soft); border-radius: 8px;
    padding: 10px 12px; min-width: 210px; max-width: 260px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
  }
  .legend-title {
    text-transform: uppercase; letter-spacing: 0.08em; font-size: 9.5px;
    color: var(--fg-3); margin-bottom: 8px; display: flex; justify-content: space-between;

  .legend-row {
    display: flex; align-items: center; gap: 8px;
    padding: 3px 0; color: var(--fg-2); cursor: pointer;

  .legend-row:hover { color: var(--fg); }
  .legend-row.hidden { opacity: 0.4; }
  .legend-row .swatch { box-shadow: 0 0 0 1px rgba(0,0,0,0.15); }
  .legend-row .lbl { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .coord-readout {
    background: var(--overlay-bg); backdrop-filter: blur(8px);

    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; color: var(--fg-2);
  }
  .coord-readout .k { color: var(--fg-4); }

  .map-btn {
    background: var(--overlay-bg); backdrop-filter: blur(8px);
    border: 1px solid var(--border-soft); color: var(--fg-2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; padding: 6px 10px; border-radius: 6px;
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;

  .map-btn:hover { color: var(--fg); border-color: var(--border-strong); }

  /* Empty state */
  .empty {
    position: absolute; inset: 0;
    display: grid; place-items: center; pointer-events: none; z-index: 300;
  }
  .empty-card {
    background: var(--overlay-bg); backdrop-filter: blur(8px);
    border: 1px solid var(--border-soft); border-radius: 10px;
    padding: 16px 22px; text-align: center; max-width: 340px;
  }
  .empty-card h3 { margin: 0 0 6px; font-size: 14px; font-weight: 500; }
  .empty-card p { margin: 0; font-size: 12px; color: var(--fg-3); }

  /* Add button */
  .add-panel {
    border: 1px dashed var(--border); background: transparent;
    color: var(--fg-3); border-radius: 8px; padding: 12px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-family: inherit; font-size: 12.5px; font-weight: 500;
    cursor: pointer; transition: all .12s ease;
  }
  .add-panel:hover { border-color: var(--border-strong); color: var(--fg); background: var(--bg-elev); }
  .add-menu {
    position: relative;
  }
  .add-menu-pop {
    position: absolute; top: calc(100% + 4px); right: 0;
    background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px; min-width: 180px; z-index: 50;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .add-menu-pop button {
    display: flex; align-items: center; gap: 8px;
    width: 100%; text-align: left;
    background: transparent; border: none; color: var(--fg-2);
    font: inherit; font-size: 12px;
    padding: 6px 8px; border-radius: 4px; cursor: pointer;
  }
  .add-menu-pop button:hover { background: var(--bg-0); color: var(--fg); }
  .add-menu-pop button svg { width: 13px; height: 13px; }
  .add-menu-pop .divider { height: 1px; background: var(--border-soft); margin: 4px 2px; }

  /* Tweaks */
  .tweaks {
    position: fixed; right: 16px; bottom: 16px;
    width: 260px; background: var(--bg-elev);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 12px; z-index: 1000;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    font-size: 12px;
  }
  .tweaks h4 {
    margin: 0 0 10px; font-size: 10.5px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; color: var(--fg-3); letter-spacing: 0.08em;
    display: flex; justify-content: space-between; align-items: center;
  }
  .tweak-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; color: var(--fg-2); gap: 8px; }
  .tweak-row label { flex: 1; }
  .tweak-row .opt {
    display: inline-flex; border: 1px solid var(--border);
    border-radius: 5px; overflow: hidden;
  }
  .tweak-row .opt button {
    background: transparent; border: none; color: var(--fg-3);
    padding: 3px 8px; font: inherit; cursor: pointer; font-size: 11px;
  }
  .tweak-row .opt button.active { background: var(--fg); color: var(--bg-0); }

  /* Leaflet tooltip */
  .leaflet-tooltip.geo-tip {
    background: var(--bg-elev); color: var(--fg);
    border: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; padding: 3px 7px;
  }
  .leaflet-tooltip.geo-tip::before { display: none; }

  /* Selected layer glow */
  .selected-glow { filter: drop-shadow(0 0 4px currentColor); }

  /* Toast */
  .toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
    background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 14px;
    font-size: 12px; color: var(--fg);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    z-index: 2000;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
  }
  .toast.err { border-color: var(--danger); color: var(--danger); }
</style>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ==================== Config (Tweaks) ==================== */
const TWEAKS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "tileStyle": "carto-voyager",
  "autoRender": false,
  "showLabels": true
}/*EDITMODE-END*/;

/* ==================== Palette ==================== */
const PALETTE = [
  '#e8a55c','#5cc8c0','#b08be0','#e08b9e',
  '#a8c86b','#6fb0e0','#e8846b','#7fc99a',
  '#d4a373','#9fa8da','#ce93d8','#80cbc4',
];

/* ==================== Samples ==================== */
const SAMPLES = {
  polygon: `{
  "type": "Polygon",
  "coordinates": [[
    [-122.5150, 37.7080],
    [-122.5150, 37.8100],
    [-122.3570, 37.8100],
    [-122.3570, 37.7080],
    [-122.5150, 37.7080]
  ]]
}`,
  line: `LINESTRING (-122.4783 37.8199, -122.4194 37.7749, -122.3893 37.7955, -122.3560 37.7875)`,
  point: `POINT (-122.4194 37.7749)`,
};

/* ==================== Parser ==================== */
const SUPPORTED = new Set(['Point','LineString','Polygon','MultiPoint','MultiLineString','MultiPolygon','GeometryCollection']);

function parseGeometry(text) {
  const t = (text || '').trim();
  if (!t) return { ok: false, empty: true };
  if (t.startsWith('{') || t.startsWith('[')) {
    try {
      const obj = JSON.parse(t);
      const geom = extractGeom(obj);
      if (!geom) return { ok: false, error: 'No geometry found in JSON' };
      validateGeom(geom);
      return { ok: true, geom, format: 'GeoJSON' };
    } catch (e) { return { ok: false, error: cleanErr(e.message) }; }
  }
  try {
    if (!window.wellknown) return { ok: false, error: 'WKT parser not loaded' };
    const geom = window.wellknown.parse(t);
    if (!geom) return { ok: false, error: 'Invalid WKT syntax' };
    validateGeom(geom);
    return { ok: true, geom, format: 'WKT' };
  } catch (e) { return { ok: false, error: cleanErr(e.message) }; }
}
function extractGeom(obj) {
  if (!obj || typeof obj !== 'object') return null;
  if (obj.type === 'FeatureCollection' && Array.isArray(obj.features)) {
    const geoms = obj.features.map(f => f.geometry).filter(Boolean);
    if (geoms.length === 0) return null;
    if (geoms.length === 1) return geoms[0];
    return { type: 'GeometryCollection', geometries: geoms };
  }
  if (obj.type === 'Feature') return obj.geometry || null;
  if (obj.type && obj.coordinates !== undefined) return obj;
  if (obj.type === 'GeometryCollection') return obj;
  return null;
}
function validateGeom(geom) {
  if (!geom || !geom.type) throw new Error('Missing geometry type');
  if (!SUPPORTED.has(geom.type)) throw new Error(`Unsupported type: ${geom.type}`);
  if (geom.type === 'GeometryCollection') {
    if (!Array.isArray(geom.geometries)) throw new Error('GeometryCollection missing .geometries');
    geom.geometries.forEach(validateGeom);
    return;
  }
  if (!Array.isArray(geom.coordinates)) throw new Error('Missing coordinates');
}
function cleanErr(msg) {
  if (!msg) return 'Parse error';
  return msg.replace(/^JSON\.parse:\s*/i, '').replace(/^Unexpected token .*? in JSON at position/, 'Invalid JSON at position');
}

/* ==================== Serialize (for sync back) ==================== */
function stringifyGeom(geom, format) {
  if (!geom) return '';
  if (format === 'WKT') {
    try { return window.wellknown.stringify(geom); } catch { /* fall through */ }
  }
  return JSON.stringify(geom, null, 2);
}

function geomStats(geom) {
  if (!geom) return null;
  let vertices = 0;
  const walk = (c) => { if (!Array.isArray(c)) return; if (typeof c[0] === 'number') { vertices++; return; } c.forEach(walk); };
  if (geom.type === 'GeometryCollection') {
    geom.geometries.forEach(g => { vertices += geomStats(g).vertices; });
    return { vertices, type: `${geom.geometries.length} parts` };
  }
  walk(geom.coordinates);
  return { vertices, type: geom.type };
}

/* ==================== UTM support (proj4) ==================== */
function utmProjString(zone, hemi) {
  const south = hemi === 'S' ? ' +south' : '';
  return `+proj=utm +zone=${zone}${south} +datum=WGS84 +units=m +no_defs`;
}
function projectCoord(coord, toProj) {
  // coord is [lng, lat] in WGS84; toProj is a proj4 definition; returns [x,y] in meters
  if (toProj === 'WGS84') return coord;
  try {
    const [x, y] = proj4('WGS84', toProj, [coord[0], coord[1]]);
    return [x, y];
  } catch { return coord; }
}
function unprojectCoord(xy, fromProj) {
  if (fromProj === 'WGS84') return xy;
  try {
    const [lng, lat] = proj4(fromProj, 'WGS84', [xy[0], xy[1]]);
    return [lng, lat];
  } catch { return xy; }
}

/* ==================== Icons ==================== */
const Icon = ({ name, size = 14 }) => {
  const c = { width: size, height: size, viewBox: '0 0 16 16', fill: 'none', stroke: 'currentColor', strokeWidth: 1.5, strokeLinecap: 'round', strokeLinejoin: 'round' };
  switch (name) {
    case 'plus': return <svg {...c}><path d="M8 3v10M3 8h10"/></svg>;
    case 'x': return <svg {...c}><path d="M4 4l8 8M12 4l-8 8"/></svg>;
    case 'trash': return <svg {...c}><path d="M3 4h10M6 4V3a1 1 0 011-1h2a1 1 0 011 1v1M5 4l.5 9a1 1 0 001 1h3a1 1 0 001-1L11 4"/></svg>;
    case 'eye': return <svg {...c}><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2"/></svg>;
    case 'eye-off': return <svg {...c}><path d="M2 2l12 12M6.7 6.7a2 2 0 002.8 2.8M4.5 4.5C2.4 5.8 1 8 1 8s2.5 5 7 5c1.3 0 2.5-.4 3.5-1M8 3c4.5 0 7 5 7 5s-.6 1.2-1.7 2.4"/></svg>;
    case 'fit': return <svg {...c}><path d="M3 6V3h3M13 6V3h-3M3 10v3h3M13 10v3h-3"/></svg>;
    case 'lock': return <svg {...c}><rect x="3" y="7" width="10" height="7" rx="1"/><path d="M5 7V5a3 3 0 016 0v2"/></svg>;
    case 'unlock': return <svg {...c}><rect x="3" y="7" width="10" height="7" rx="1"/><path d="M5 7V5a3 3 0 015.9-.8"/></svg>;
    case 'upload': return <svg {...c}><path d="M8 11V3M5 6l3-3 3 3M3 12v1a1 1 0 001 1h8a1 1 0 001-1v-1"/></svg>;
    case 'cursor': return <svg {...c}><path d="M3 2l5 12 2-5 5-2z"/></svg>;
    case 'point': return <svg {...c}><circle cx="8" cy="8" r="2.5" fill="currentColor" stroke="none"/><circle cx="8" cy="8" r="5.5"/></svg>;
    case 'line': return <svg {...c}><circle cx="3" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="13" cy="4" r="1.5" fill="currentColor" stroke="none"/><path d="M3 12L13 4"/></svg>;
    case 'polygon': return <svg {...c}><path d="M3 6l5-3 5 3-2 7h-6z"/></svg>;
    case 'rect': return <svg {...c}><rect x="3" y="4" width="10" height="8"/></svg>;
    case 'draw': return <svg {...c}><path d="M2 14l4-1 7-7-3-3-7 7-1 4z"/></svg>;
    case 'copy': return <svg {...c}><rect x="5" y="5" width="8" height="9" rx="1"/><path d="M3 10V3a1 1 0 011-1h6"/></svg>;
    case 'check': return <svg {...c}><path d="M3 8l3 3 7-7"/></svg>;
    case 'sun': return <svg {...c}><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3 3l1.4 1.4M11.6 11.6L13 13M3 13l1.4-1.4M11.6 4.4L13 3"/></svg>;
    case 'moon': return <svg {...c}><path d="M13 9.5A6 6 0 016.5 3a6 6 0 103 9.5 6 6 0 003.5-3z"/></svg>;
    case 'auto': return <svg {...c}><circle cx="8" cy="8" r="5.5"/><path d="M8 2.5v11" /><path d="M8 2.5a5.5 5.5 0 010 11" fill="currentColor" stroke="none"/></svg>;
    case 'file': return <svg {...c}><path d="M4 2h5l3 3v9H4z"/><path d="M9 2v3h3"/></svg>;
    case 'globe': return <svg {...c}><circle cx="8" cy="8" r="6"/><path d="M2 8h12M8 2c2 2 3 4 3 6s-1 4-3 6c-2-2-3-4-3-6s1-4 3-6z"/></svg>;
    case 'arrow-right': return <svg {...c}><path d="M3 8h10M9 4l4 4-4 4"/></svg>;
    default: return null;
  }
};

/* ==================== Tiles ==================== */
const TILE_STYLES = {
  'carto-voyager': { url: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png', attr: '© OpenStreetMap · © CARTO' },
  'carto-labels':  { url: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', attr: '© OpenStreetMap · © CARTO' },
  'osm':           { url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', attr: '© OpenStreetMap contributors' },
};

/* ==================== Layer rendering ==================== */
function addGeomToGroup(group, geom, color, pmOpts) {
  const pointStyle = { radius: 6, fillColor: color, color: '#ffffff', weight: 2, opacity: 1, fillOpacity: 1 };
  const lineStyle = { color, weight: 3, opacity: 0.95 };
  const polyStyle = { color, weight: 2, opacity: 0.95, fillColor: color, fillOpacity: 0.18 };
  L.geoJSON(geom, {
    pointToLayer: (_, latlng) => L.circleMarker(latlng, pointStyle),
    style: (feat) => {
      const t = feat && feat.geometry ? feat.geometry.type : geom.type;
      if (t && t.includes('Line')) return lineStyle;
      return polyStyle;
    },
  }).eachLayer(l => group.addLayer(l));
  return group;
}

/* ==================== Layer Panel ==================== */
function LayerPanel({ layer, onChange, onRemove, onRename, onClear, onToggleVisible, onToggleLock, onUpload, autoRender, onManualRender, selected, onSelect }) {
  const [focused, setFocused] = useState(false);
  const [copied, setCopied] = useState(false);
  const fileRef = useRef();
  const pr = layer.parseResult;
  const stats = pr && pr.ok ? geomStats(pr.geom) : null;
  const color = layer.color;
  const isLocked = layer.locked;

  return (
    <div
      className={`panel ${focused || selected ? 'focused' : ''} ${pr && !pr.ok && !pr.empty ? 'errored' : ''} ${isLocked ? 'locked' : ''}`}
      style={{ '--_c': color }}
      onClick={() => onSelect(layer.id)}
    >
      <div className="panel-head">
        <span className="swatch" />
        <div className="panel-name">
          <input
            value={layer.name}
            onChange={(e) => onRename(layer.id, e.target.value)}
            onFocus={(e) => e.target.select()}
            disabled={isLocked}
            spellCheck={false}
          />
        </div>
        {layer.source && <span className="meta src">{layer.source}</span>}
        {pr && !pr.ok && !pr.empty && <span className="meta err">error</span>}
        <button className="btn icon ghost" title={isLocked ? 'Unlock' : 'Lock (read-only)'} onClick={(e) => { e.stopPropagation(); onToggleLock(layer.id); }}>
          <Icon name={isLocked ? 'lock' : 'unlock'} />
        </button>
        <button className="btn icon ghost" title={layer.visible === false ? 'Show' : 'Hide'} onClick={(e) => { e.stopPropagation(); onToggleVisible(layer.id); }}>
          <Icon name={layer.visible === false ? 'eye-off' : 'eye'} />
        </button>
        <button className="btn icon ghost" title="Remove" onClick={(e) => { e.stopPropagation(); onRemove(layer.id); }}>
          <Icon name="trash" />
        </button>
      </div>

      <div className="panel-body">
        <textarea
          className="geom-input"
          value={layer.text}
          onChange={(e) => onChange(layer.id, e.target.value)}
          onFocus={() => { setFocused(true); onSelect(layer.id); }}
          onBlur={() => setFocused(false)}
          placeholder={isLocked ? 'Locked — read-only base layer' : `Paste GeoJSON or WKT…
e.g. POINT (-122.419 37.775)`}
          spellCheck={false}
          readOnly={isLocked}
        />
        {layer.text && (
          <button
            className="copy-btn"
            title={copied ? 'Copied!' : 'Copy to clipboard'}
            onClick={(e) => {
              e.stopPropagation();
              try {
                navigator.clipboard.writeText(layer.text);
                setCopied(true);
                setTimeout(() => setCopied(false), 1200);
              } catch {}
            }}
          >
            <Icon name={copied ? 'check' : 'copy'} size={12} />
          </button>
        )}
      </div>

      <div className="panel-foot">
        <div className="panel-foot-left">
          {pr && pr.ok && stats && <span className="meta ok">{pr.format} · {pr.geom.type} · {stats.vertices} pts</span>}
          {pr && !pr.ok && !pr.empty && (
            <span className="err-msg" title={pr.error}>⚠ {pr.error}</span>
          )}
          {(!pr || pr.empty) && <span style={{ color: 'var(--fg-4)' }}>Awaiting input…</span>}
        </div>
        <div style={{ display: 'flex', gap: 4 }}>
          <input
            ref={fileRef} type="file" style={{ display: 'none' }}
            accept=".geojson,.json,.wkt,.txt,application/geo+json,application/json,text/plain"
            onChange={(e) => { const f = e.target.files[0]; if (f) onUpload(layer.id, f); e.target.value = ''; }}
          />
          <button className="btn sm ghost" title="Upload file" disabled={isLocked} onClick={(e) => { e.stopPropagation(); fileRef.current?.click(); }}>
            <Icon name="upload" size={11} />
          </button>
          {!autoRender && !isLocked && (
            <button className="btn sm" onClick={(e) => { e.stopPropagation(); onManualRender(layer.id); }}>Render</button>
          )}
          <button className="btn sm ghost" disabled={isLocked} onClick={(e) => { e.stopPropagation(); onClear(layer.id); }}>Clear</button>
        </div>
      </div>
    </div>
  );
}

/* ==================== Legend ==================== */
function Legend({ layers, onToggle, onZoomTo, crsLabel }) {
  const valid = layers.filter(p => p.parseResult && p.parseResult.ok);
  if (valid.length === 0) return null;
  return (
    <div className="legend">
      <div className="legend-title">
        <span>Layers · {valid.length}/{layers.length}</span>
        <span>{crsLabel}</span>
      </div>
      {layers.map(p => {
        const ok = p.parseResult && p.parseResult.ok;
        return (
          <div key={p.id} className={`legend-row ${p.visible === false ? 'hidden' : ''}`}
               onClick={() => ok && onZoomTo(p.id)}
               onDoubleClick={() => onToggle(p.id)}
               title={ok ? 'Click to zoom · double-click to toggle' : 'Not rendered'}>
            <span className="swatch" style={{ '--_c': p.color, background: p.color }} />
            <span className="lbl">{p.name}</span>
            <span className="cnt">{ok ? p.parseResult.geom.type.replace(/([A-Z])/g,' $1').trim().split(' ').map(w=>w[0]).join('') : '—'}</span>
          </div>
        );
      })}
    </div>
  );
}

/* ==================== App ==================== */
function makeLayer(index, opts = {}) {
  return {
    id: Math.random().toString(36).slice(2, 9),
    name: opts.name || `Geometry ${index + 1}`,
    text: opts.text || '',
    color: opts.color || PALETTE[index % PALETTE.length],
    visible: true,
    locked: opts.locked || false,
    source: opts.source || null, // 'drawn' | 'file' | null (manual)
    parseResult: opts.text ? parseGeometry(opts.text) : null,
  };
}

function Visualizer({ tab, setTab }) {
  const mapContainerRef = useRef(null);
  const mapRef = useRef(null);
  const tileRef = useRef(null);
  const layerGroupsRef = useRef({}); // id -> L.featureGroup

  const [tileStyle, setTileStyle] = useState(TWEAKS.tileStyle);
  const { theme } = React.useContext(ThemeCtx);
  const [autoRender, setAutoRender] = useState(TWEAKS.autoRender);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [coord, setCoord] = useState(null);
  const [tool, setTool] = useState('cursor'); // cursor|point|line|polygon|rect
  const [selectedId, setSelectedId] = useState(null);
  const [toast, setToast] = useState(null);
  const [crs, setCrs] = useState('WGS84'); // 'WGS84' | 'UTM'
  const [utmZone, setUtmZone] = useState(10);
  const [utmHemi, setUtmHemi] = useState('N');

  const layersRef = useRef([]); // keep a stable reference for callbacks

  const [layers, setLayers] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('geotools.layers') || 'null');
      if (saved && Array.isArray(saved) && saved.length > 0) {
        return saved.map((p, i) => ({
          ...p,
          color: p.color || PALETTE[i % PALETTE.length],
          visible: p.visible !== false,
          parseResult: parseGeometry(p.text),
        }));
      }
    } catch {}
    const a = makeLayer(0, { name: 'SF Bounds', text: SAMPLES.polygon });
    const b = makeLayer(1, { name: 'Route A', text: SAMPLES.line });
    return [a, b];
  });

  useEffect(() => { layersRef.current = layers; }, [layers]);

  /* Init map */
  useEffect(() => {
    if (!mapContainerRef.current || mapRef.current) return;
    const map = L.map(mapContainerRef.current, {
      center: [37.7749, -122.4194],
      zoom: 11, zoomControl: false, worldCopyJump: true,
    });
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    map.pm.setGlobalOptions({ snappable: true, snapDistance: 15 });
    mapRef.current = map;
    return () => { map.remove(); mapRef.current = null; };
  }, []);

  /* Tiles */
  useEffect(() => {
    const map = mapRef.current; if (!map) return;
    if (tileRef.current) map.removeLayer(tileRef.current);
    const cfg = TILE_STYLES[tileStyle] || TILE_STYLES['carto-voyager'];
    tileRef.current = L.tileLayer(cfg.url, { attribution: cfg.attr, maxZoom: 20, subdomains: 'abcd' }).addTo(map);
  }, [tileStyle]);

  /* Coord readout */
  useEffect(() => {
    const map = mapRef.current; if (!map) return;
    const onMove = (e) => setCoord({ lat: e.latlng.lat, lng: e.latlng.lng, zoom: map.getZoom() });
    const onZoom = () => setCoord(c => c ? { ...c, zoom: map.getZoom() } : null);
    const onOut = () => setCoord(null);
    map.on('mousemove', onMove); map.on('zoomend', onZoom); map.on('mouseout', onOut);
    return () => { map.off('mousemove', onMove); map.off('zoomend', onZoom); map.off('mouseout', onOut); };
  }, []);

  /* Persist */
  useEffect(() => {
    const toSave = layers.map(({ parseResult, ...rest }) => rest);
    try { localStorage.setItem('geotools.layers', JSON.stringify(toSave)); } catch {}
  }, [layers]);

  /* Render layers whenever they change */
  useEffect(() => {
    const map = mapRef.current; if (!map) return;
    // Clear old
    Object.values(layerGroupsRef.current).forEach(lg => map.removeLayer(lg));
    layerGroupsRef.current = {};

    layers.forEach(p => {
      if (p.parseResult && p.parseResult.ok && p.visible !== false) {
        const group = L.featureGroup();
        try {
          addGeomToGroup(group, p.parseResult.geom, p.color);
          // Attach metadata so we can identify hits back to layer id
          group.eachLayer(l => {
            l.__layerId = p.id;
            l.__locked = !!p.locked;
            l.on('click', (ev) => {
              L.DomEvent.stopPropagation(ev);
              setSelectedId(p.id);
            });
            // Attach pm edit hooks (only when not locked and tool is cursor)
            if (!p.locked) {
              l.on('pm:edit', handlePmEdit);
              l.on('pm:dragend', handlePmEdit);
            }
          });
          group.bindTooltip(p.name, { permanent: false, direction: 'top', className: 'geo-tip', sticky: true });
          group.addTo(map);
          layerGroupsRef.current[p.id] = group;
        } catch {}
      }
    });
  }, [layers]);

  /* Auto-fit when geometry set changes */
  const fitSig = layers.map(p => p.parseResult && p.parseResult.ok && p.visible !== false ? (p.id + ':' + JSON.stringify(p.parseResult.geom).length) : '').join('|');
  useEffect(() => {
    const t = setTimeout(() => {
      const map = mapRef.current; if (!map) return;
      const groups = Object.values(layerGroupsRef.current);
      if (groups.length === 0) return;
      const all = L.featureGroup(groups);
      const b = all.getBounds();
      if (b.isValid()) map.fitBounds(b, { padding: [40, 40], maxZoom: 16 });
    }, 300);
    return () => clearTimeout(t);
  }, [fitSig]);

  /* ==================== Tool mode (draw / edit) ==================== */
  useEffect(() => {
    const map = mapRef.current; if (!map) return;

    // Disable previous modes
    map.pm.disableDraw();
    map.pm.disableGlobalEditMode();
    map.pm.disableGlobalDragMode();

    const pmStyle = () => {
      const nextColor = nextAvailableColor();
      return {
        pathOptions: { color: nextColor, weight: 2.5, fillColor: nextColor, fillOpacity: 0.18 },
        templineStyle: { color: nextColor },
        hintlineStyle: { color: nextColor, dashArray: '5,5' },
        markerStyle: { icon: pointIcon(nextColor) },
        continueDrawing: false,
      };
    };

    if (tool === 'cursor') {
      // Enable global edit mode on unlocked layers
      map.pm.enableGlobalEditMode({
        allowSelfIntersection: true,
        snappable: true,
      });
      // Geoman will enable edit on all pm-enabled layers; we need to skip locked ones
      Object.entries(layerGroupsRef.current).forEach(([id, group]) => {
        const lyr = layersRef.current.find(l => l.id === id);
        group.eachLayer(l => {
          if (lyr && lyr.locked) {
            l.pm?.disable();
            l.options.pmIgnore = true;
          } else {
            l.options.pmIgnore = false;
            l.pm?.enable({ snappable: true, allowSelfIntersection: true });
          }
        });
      });
    } else if (tool === 'point') {
      map.pm.enableDraw('Marker', { ...pmStyle(), markerStyle: { icon: pointIcon(nextAvailableColor()) } });
    } else if (tool === 'line') {
      map.pm.enableDraw('Line', pmStyle());
    } else if (tool === 'polygon') {
      map.pm.enableDraw('Polygon', pmStyle());
    } else if (tool === 'rect') {
      map.pm.enableDraw('Rectangle', pmStyle());
    }

    return () => {
      map.pm.disableDraw();
      map.pm.disableGlobalEditMode();
    };
  }, [tool, layers.length]);

  /* Geoman create handler */
  useEffect(() => {
    const map = mapRef.current; if (!map) return;
    const onCreate = (e) => {
      const layer = e.layer;
      // Convert to GeoJSON geometry
      let gj;
      try { gj = layer.toGeoJSON(); } catch { return; }
      const geom = gj.geometry || gj;
      // Remove the temp layer — our React state will re-render it styled
      map.removeLayer(layer);
      addDrawnLayer(geom);
      setTool('cursor');
    };
    map.on('pm:create', onCreate);
    return () => { map.off('pm:create', onCreate); };
  }, []);

  /* pm:edit handler (bound per-layer in render effect) */
  function handlePmEdit(ev) {
    const lyrObj = ev.target;
    const id = lyrObj.__layerId;
    if (!id) return;
    // Collect all geometries within that layer's group
    const group = layerGroupsRef.current[id];
    if (!group) return;
    const feats = [];
    group.eachLayer(l => {
      try { feats.push(l.toGeoJSON()); } catch {}
    });
    let geom;
    if (feats.length === 1) geom = feats[0].geometry;
    else geom = { type: 'GeometryCollection', geometries: feats.map(f => f.geometry) };

    // Sync back to layer, preserving original format
    setLayers(ps => ps.map(p => {
      if (p.id !== id) return p;
      // If source is 'file' => don't sync back per spec
      if (p.source === 'file') return p;
      const origFormat = (p.parseResult && p.parseResult.ok) ? p.parseResult.format : 'GeoJSON';
      const text = origFormat === 'WKT' ? stringifyGeom(geom, 'WKT') : JSON.stringify(geom, null, 2);
      return { ...p, text, parseResult: { ok: true, geom, format: origFormat } };
    }));
  }

  /* ==================== Helpers ==================== */
  function pointIcon(color) {
    return L.divIcon({
      className: '',
      iconSize: [14, 14],
      iconAnchor: [7, 7],
      html: `<div style="width:12px;height:12px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 0 0 1.5px ${color};"></div>`
    });
  }
  function nextAvailableColor() {
    const used = new Set(layersRef.current.map(l => l.color));
    return PALETTE.find(c => !used.has(c)) || PALETTE[layersRef.current.length % PALETTE.length];
  }

  function addDrawnLayer(geom) {
    const idx = layersRef.current.length;
    const color = nextAvailableColor();
    const name = `${geom.type} ${idx + 1}`;
    const text = JSON.stringify(geom, null, 2);
    const newLayer = {
      id: Math.random().toString(36).slice(2, 9),
      name, text, color,
      visible: true, locked: false, source: 'drawn',
      parseResult: { ok: true, geom, format: 'GeoJSON' },
    };
    setLayers(ps => [...ps, newLayer]);
    setSelectedId(newLayer.id);
    showToast(`Created ${geom.type} as new layer`);
  }

  function showToast(msg, err) {
    setToast({ msg, err });
    setTimeout(() => setToast(null), 2200);
  }

  /* ==================== Layer actions ==================== */
  const updateText = (id, text) => {
    setLayers(ps => ps.map(p => p.id === id ? {
      ...p,
      text,
      source: null, // manual edit
      parseResult: autoRender ? parseGeometry(text) : p.parseResult
    } : p));
  };
  const manualRender = (id) => {
    setLayers(ps => ps.map(p => p.id === id ? { ...p, parseResult: parseGeometry(p.text) } : p));
  };
  const addLayer = (preset) => {
    setLayers(ps => {
      const color = (() => {
        const used = new Set(ps.map(l => l.color));
        return PALETTE.find(c => !used.has(c)) || PALETTE[ps.length % PALETTE.length];
      })();
      const newLayer = makeLayer(ps.length, {
        color,
        text: preset ? SAMPLES[preset] : '',
        name: preset ? `${preset.charAt(0).toUpperCase() + preset.slice(1)} ${ps.length + 1}` : `Geometry ${ps.length + 1}`,
      });
      return [...ps, newLayer];
    });
  };
  const removeLayer = (id) => setLayers(ps => ps.filter(p => p.id !== id));
  const renameLayer = (id, name) => setLayers(ps => ps.map(p => p.id === id ? { ...p, name } : p));
  const clearLayer = (id) => setLayers(ps => ps.map(p => p.id === id ? { ...p, text: '', parseResult: null, source: null } : p));
  const toggleVisible = (id) => setLayers(ps => ps.map(p => p.id === id ? { ...p, visible: p.visible === false } : p));
  const toggleLock = (id) => setLayers(ps => ps.map(p => p.id === id ? { ...p, locked: !p.locked } : p));

  const handleUpload = async (id, file) => {
    try {
      const text = await file.text();
      const res = parseGeometry(text);
      if (!res.ok) { showToast(`Parse failed: ${res.error}`, true); return; }
      setLayers(ps => ps.map(p => p.id === id ? {
        ...p,
        text: res.format === 'GeoJSON' ? JSON.stringify(res.geom, null, 2) : text,
        parseResult: res,
        source: 'file',
        name: p.name.startsWith('Geometry') ? file.name.replace(/\.[^.]+$/, '') : p.name,
      } : p));
      showToast(`Loaded ${file.name}`);
    } catch (e) {
      showToast(`Read error: ${e.message}`, true);
    }
  };

  const zoomTo = (id) => {
    const map = mapRef.current; const lg = layerGroupsRef.current[id];
    if (!map || !lg) return;
    const b = lg.getBounds();
    if (b.isValid()) map.fitBounds(b, { padding: [60, 60], maxZoom: 17 });
  };

  const fitAll = () => {
    const map = mapRef.current; if (!map) return;
    const groups = Object.values(layerGroupsRef.current);
    if (groups.length === 0) return;
    const b = L.featureGroup(groups).getBounds();
    if (b.isValid()) map.fitBounds(b, { padding: [40, 40], maxZoom: 16 });
  };

  const clearAll = () => setLayers(ps => ps.map(p => p.locked ? p : { ...p, text: '', parseResult: null, source: null }));

  useEffect(() => { if (autoRender) setLayers(ps => ps.map(p => ({ ...p, parseResult: parseGeometry(p.text) }))); }, [autoRender]);

  /* Tweaks bridge */
  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data; if (!d || typeof d !== 'object') return;
      if (d.type === '__activate_edit_mode') setTweaksOpen(true);
      if (d.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const persistTweak = (k, v) => window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');

  /* Derived */
  const renderedCount = layers.filter(p => p.parseResult && p.parseResult.ok).length;
  const crsLabel = crs === 'WGS84' ? 'WGS84' : `UTM ${utmZone}${utmHemi}`;

  const coordDisplay = useMemo(() => {
    if (!coord) return null;
    if (crs === 'WGS84') return { a: ['lat', coord.lat.toFixed(5)], b: ['lng', coord.lng.toFixed(5)] };
    try {
      const [x, y] = projectCoord([coord.lng, coord.lat], utmProjString(utmZone, utmHemi));
      return { a: ['E', x.toFixed(1) + 'm'], b: ['N', y.toFixed(1) + 'm'] };
    } catch { return { a: ['lat', coord.lat.toFixed(5)], b: ['lng', coord.lng.toFixed(5)] }; }
  }, [coord, crs, utmZone, utmHemi]);

  const [addMenuOpen, setAddMenuOpen] = useState(false);
  const addMenuRef = useRef();
  useEffect(() => {
    const onDoc = (e) => { if (addMenuRef.current && !addMenuRef.current.contains(e.target)) setAddMenuOpen(false); };
    if (addMenuOpen) document.addEventListener('click', onDoc);
    return () => document.removeEventListener('click', onDoc);
  }, [addMenuOpen]);
  const globalFileRef = useRef();

  return (
    <>
      <AppShell tab={tab} setTab={setTab} rightMeta={<><span className="dot" /> <span>{renderedCount}/{layers.length} rendered</span></>} />

      <div className="split">
        <aside className="side">
          <div className="side-header">
            <div className="side-title">Layers · {layers.length}</div>
            <div className="side-actions">
              <input ref={globalFileRef} type="file" style={{ display: 'none' }}
                accept=".geojson,.json,.wkt,.txt"
                onChange={async (e) => {
                  const f = e.target.files[0]; e.target.value = '';
                  if (!f) return;
                  try {
                    const text = await f.text();
                    const res = parseGeometry(text);
                    if (!res.ok) { showToast(`Parse failed: ${res.error}`, true); return; }
                    setLayers(ps => {
                      const color = (() => {
                        const used = new Set(ps.map(l => l.color));
                        return PALETTE.find(c => !used.has(c)) || PALETTE[ps.length % PALETTE.length];
                      })();
                      return [...ps, {
                        id: Math.random().toString(36).slice(2, 9),
                        name: f.name.replace(/\.[^.]+$/, ''),
                        text: res.format === 'GeoJSON' ? JSON.stringify(res.geom, null, 2) : text,
                        color, visible: true, locked: false, source: 'file',
                        parseResult: res,
                      }];
                    });
                    showToast(`Loaded ${f.name}`);
                  } catch (err) { showToast(`Read error: ${err.message}`, true); }
                }} />
              <button className="btn sm ghost" onClick={clearAll}>Clear all</button>
              <div className="add-menu" ref={addMenuRef}>
                <button className="btn sm primary" onClick={() => setAddMenuOpen(v => !v)}>
                  <Icon name="plus" size={12} /> New Layer
                </button>
                {addMenuOpen && (
                  <div className="add-menu-pop">
                    <button onClick={() => { addLayer(); setAddMenuOpen(false); }}>
                      <Icon name="draw" size={12} /> Empty layer
                    </button>
                    <button onClick={() => { globalFileRef.current?.click(); setAddMenuOpen(false); }}>
                      <Icon name="upload" size={12} /> From file
                    </button>
                    <div className="divider" />
                    <button onClick={() => { setTool('point'); setAddMenuOpen(false); }}>
                      <Icon name="point" size={12} /> Draw point
                    </button>
                    <button onClick={() => { setTool('line'); setAddMenuOpen(false); }}>
                      <Icon name="line" size={12} /> Draw line
                    </button>
                    <button onClick={() => { setTool('polygon'); setAddMenuOpen(false); }}>
                      <Icon name="polygon" size={12} /> Draw polygon
                    </button>
                    <button onClick={() => { setTool('rect'); setAddMenuOpen(false); }}>
                      <Icon name="rect" size={12} /> Draw rectangle
                    </button>
                  </div>
                )}
              </div>
            </div>
          </div>
          <div className="side-scroll">
            {layers.map((p, i) => (
              <LayerPanel key={p.id} layer={p}
                selected={p.id === selectedId}
                onSelect={setSelectedId}
                onChange={updateText} onRemove={removeLayer}
                onRename={renameLayer} onClear={clearLayer}
                onToggleVisible={toggleVisible} onToggleLock={toggleLock}
                onUpload={handleUpload} onManualRender={manualRender}
                autoRender={autoRender} />
            ))}
            <button className="add-panel" onClick={() => addLayer()}>
              <Icon name="plus" size={14} /> Add layer
            </button>
          </div>
        </aside>

        <div className="map-wrap">
          <div className="map-toolbar">
            <div className="tool-group">
              <button className={`tool-btn ${tool === 'cursor' ? 'active' : ''}`} onClick={() => setTool('cursor')} title="Cursor (select/edit)">
                <Icon name="cursor" size={12} /> Cursor
              </button>
              <button className={`tool-btn ${tool === 'point' ? 'active' : ''}`} onClick={() => setTool('point')} title="Draw point">
                <Icon name="point" size={12} /> Point
              </button>
              <button className={`tool-btn ${tool === 'line' ? 'active' : ''}`} onClick={() => setTool('line')} title="Draw line">
                <Icon name="line" size={12} /> Line
              </button>
              <button className={`tool-btn ${tool === 'polygon' ? 'active' : ''}`} onClick={() => setTool('polygon')} title="Draw polygon">
                <Icon name="polygon" size={12} /> Polygon
              </button>
              <button className={`tool-btn ${tool === 'rect' ? 'active' : ''}`} onClick={() => setTool('rect')} title="Draw rectangle">
                <Icon name="rect" size={12} /> Rectangle
              </button>
            </div>
            <span className="tool-hint">
              {tool === 'cursor' && 'Click a geometry to edit vertices. Drag to move.'}
              {tool === 'point' && 'Click map to place a point'}
              {tool === 'line' && 'Click to add vertices · double-click to finish'}
              {tool === 'polygon' && 'Click to add vertices · double-click to finish'}
              {tool === 'rect' && 'Click + drag to draw a rectangle'}
            </span>
          </div>

          <div className="map-inner">
            <div id="map" ref={mapContainerRef} />

            <div className="map-overlay-tl">
              <Legend layers={layers} onToggle={toggleVisible} onZoomTo={zoomTo} crsLabel={crsLabel} />
            </div>

            <div className="map-overlay-tr">
              <button className="map-btn" onClick={fitAll}><Icon name="fit" size={11} /> Fit all</button>
            </div>

            <div className="map-overlay-bl">
              {coordDisplay && (
                <div className="coord-readout">
                  <span className="k">{coordDisplay.a[0]}</span> {coordDisplay.a[1]}
                  <span style={{ color: 'var(--fg-4)', margin: '0 6px' }}>·</span>
                  <span className="k">{coordDisplay.b[0]}</span> {coordDisplay.b[1]}
                  <span style={{ color: 'var(--fg-4)', margin: '0 6px' }}>·</span>
                  <span className="k">z</span> {coord?.zoom ?? '—'}
                </div>
              )}
            </div>

            {renderedCount === 0 && (
              <div className="empty">
                <div className="empty-card">
                  <h3>No geometries yet</h3>
                  <p>Paste GeoJSON/WKT, upload a file, or pick a draw tool above.</p>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>

      {toast && <div className={`toast ${toast.err ? 'err' : ''}`}>{toast.msg}</div>}

      {tweaksOpen && (
        <div className="tweaks">
          <h4>
            <span>Tweaks</span>
            <button className="btn icon ghost" onClick={() => setTweaksOpen(false)}><Icon name="x" size={11} /></button>
          </h4>
          <div className="tweak-row">
            <label>Tiles</label>
            <div className="opt">
              {['carto-voyager','carto-labels','osm'].map(t => (
                <button key={t} className={tileStyle === t ? 'active' : ''} onClick={() => { setTileStyle(t); persistTweak('tileStyle', t); }}>
                  {t === 'carto-voyager' ? 'Clean' : t === 'carto-labels' ? 'Labels' : 'OSM'}
                </button>
              ))}
            </div>
          </div>
          <div className="tweak-row">
            <label>Render</label>
            <div className="opt">
              <button className={autoRender ? 'active' : ''} onClick={() => { setAutoRender(true); persistTweak('autoRender', true); }}>Auto</button>
              <button className={!autoRender ? 'active' : ''} onClick={() => { setAutoRender(false); persistTweak('autoRender', false); }}>Manual</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

/* ==================== Converter ==================== */
const CRS_PRESETS = [
  { id: 'EPSG:4326', label: 'WGS84 (lng/lat)', proj: 'WGS84' },
  { id: 'EPSG:32649', label: 'UTM Zone 49N', proj: '+proj=utm +zone=49 +datum=WGS84 +units=m +no_defs' },
  { id: 'EPSG:32650', label: 'UTM Zone 50N', proj: '+proj=utm +zone=50 +datum=WGS84 +units=m +no_defs' },
  { id: 'EPSG:32651', label: 'UTM Zone 51N', proj: '+proj=utm +zone=51 +datum=WGS84 +units=m +no_defs' },
  { id: 'EPSG:3857',  label: 'Web Mercator',  proj: 'EPSG:3857' },
];
const CRS_PRESETS_UTM_NS = (() => {
  const out = [];
  for (let z = 1; z <= 60; z++) out.push({ id: `UTM${z}N`, label: `UTM Zone ${z}N`, proj: `+proj=utm +zone=${z} +datum=WGS84 +units=m +no_defs` });
  for (let z = 1; z <= 60; z++) out.push({ id: `UTM${z}S`, label: `UTM Zone ${z}S`, proj: `+proj=utm +zone=${z} +south +datum=WGS84 +units=m +no_defs` });
  return out;
})();
function resolveCrs(id) {
  const p = CRS_PRESETS.find(x => x.id === id) || CRS_PRESETS_UTM_NS.find(x => x.id === id);
  return p ? p.proj : null;
}
function isUtmCrs(id) {
  if (!id) return false;
  if (typeof id === 'string' && /\+proj=utm/i.test(id)) return true;
  return CRS_PRESETS_UTM_NS.some(x => x.id === id || x.proj === id);
}
function crsShort(id) {
  if (!id) return '';
  if (typeof id === 'string' && /\+proj=utm/i.test(id)) {
    const z = id.match(/\+zone=(\d+)/i);
    const s = /\+south\b/i.test(id);
    return z ? `UTM ${z[1]}${s ? 'S' : 'N'}` : 'UTM';
  }
  const p = CRS_PRESETS.find(x => x.id === id) || CRS_PRESETS_UTM_NS.find(x => x.id === id || x.proj === id);
  return p ? (p.id) : id;
}

/* Transform every coord in a geometry */
function transformGeom(geom, xform) {
  if (!geom) return geom;
  if (geom.type === 'GeometryCollection') {
    return { ...geom, geometries: geom.geometries.map(g => transformGeom(g, xform)) };
  }
  const walk = (c) => {
    if (!Array.isArray(c)) return c;
    if (typeof c[0] === 'number') return xform(c);
    return c.map(walk);
  };
  return { ...geom, coordinates: walk(geom.coordinates) };
}

function Converter() {
  const [mode, setMode] = useState(() => {
    try { return localStorage.getItem('geotools.convMode') || 'crs'; } catch { return 'crs'; }
  });
  useEffect(() => { try { localStorage.setItem('geotools.convMode', mode); } catch {} }, [mode]);

  const [input, setInput] = useState(`{
  "type": "Polygon",
  "coordinates": [[
    [-122.515, 37.708],
    [-122.515, 37.810],
    [-122.357, 37.810],
    [-122.357, 37.708],
    [-122.515, 37.708]
  ]]
}`);
  const [outFormat, setOutFormat] = useState('WKT');      // GeoJSON | WKT
  const [fromCrs, setFromCrs] = useState('EPSG:4326');
  const [toCrs, setToCrs] = useState('EPSG:32650');
  const [originX, setOriginX] = useState(0);
  const [originY, setOriginY] = useState(0);
  const [applyOrigin, setApplyOrigin] = useState('none'); // none | after | before
  const [copied, setCopied] = useState(false);

  const parsed = useMemo(() => parseGeometry(input), [input]);

  const utmInvolved = useMemo(() => isUtmCrs(fromCrs) || isUtmCrs(toCrs), [fromCrs, toCrs]);

  const result = useMemo(() => {
    if (!parsed.ok) return { ok: false, error: parsed.error || 'Empty input' };
    try {
      const isFormatMode = mode === 'format';
      const effFrom = isFormatMode ? 'EPSG:4326' : fromCrs;
      const effTo = isFormatMode ? 'EPSG:4326' : toCrs;
      const effApplyOrigin = isFormatMode ? 'none' : applyOrigin;

      const fromP = resolveCrs(effFrom) || 'WGS84';
      const toP = resolveCrs(effTo) || 'WGS84';
      const same = fromP === toP;
      const ox = Number(originX) || 0;
      const oy = Number(originY) || 0;

      let geom = parsed.geom;
      if (!same || (effApplyOrigin !== 'none' && (ox || oy))) {
        geom = transformGeom(geom, (c) => {
          let pt = [c[0], c[1]];
          if (effApplyOrigin === 'before' && (ox || oy)) pt = [pt[0] + ox, pt[1] + oy];
          if (!same) {
            try { const r = proj4(fromP, toP, pt); pt = [r[0], r[1]]; } catch {}
          }
          if (effApplyOrigin === 'after' && (ox || oy)) pt = [pt[0] - ox, pt[1] - oy];
          return c.length > 2 ? [pt[0], pt[1], c[2]] : pt;
        });
      }

      let text;
      if (outFormat === 'WKT') text = window.wellknown.stringify(geom);
      else text = JSON.stringify(geom, null, 2);
      return { ok: true, text, geom };
    } catch (e) { return { ok: false, error: e.message }; }
  }, [parsed, mode, fromCrs, toCrs, originX, originY, outFormat, applyOrigin]);

  const swap = () => { setFromCrs(toCrs); setToCrs(fromCrs); };

  /* Preview map */
  const mapRef = useRef(null);
  const containerRef = useRef(null);
  const layerRef = useRef(null);
  useEffect(() => {
    if (!containerRef.current || mapRef.current) return;
    const map = L.map(containerRef.current, { center: [37.78, -122.43], zoom: 10, zoomControl: false });
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.tileLayer(TILE_STYLES['carto-voyager'].url, { attribution: TILE_STYLES['carto-voyager'].attr, subdomains: 'abcd', maxZoom: 20 }).addTo(map);
    mapRef.current = map;
    return () => { map.remove(); mapRef.current = null; };
  }, []);
  // Render the INPUT geometry on map (always in WGS84). If input CRS isn't WGS84, reproject it back for display.
  useEffect(() => {
    const map = mapRef.current; if (!map) return;
    if (layerRef.current) { map.removeLayer(layerRef.current); layerRef.current = null; }
    if (!parsed.ok) return;
    try {
      const effFrom = mode === 'format' ? 'EPSG:4326' : fromCrs;
      const effApplyOrigin = mode === 'format' ? 'none' : applyOrigin;
      const fromP = resolveCrs(effFrom) || 'WGS84';
      const ox = Number(originX) || 0, oy = Number(originY) || 0;
      let geom = parsed.geom;
      if (fromP !== 'WGS84' || (effApplyOrigin === 'before' && (ox || oy))) {
        geom = transformGeom(geom, (c) => {
          let pt = [c[0], c[1]];
          if (effApplyOrigin === 'before' && (ox || oy)) pt = [pt[0] + ox, pt[1] + oy];
          if (fromP !== 'WGS84') {
            try { const r = proj4(fromP, 'WGS84', pt); pt = [r[0], r[1]]; } catch {}
          }
          return pt;
        });
      }
      const group = L.featureGroup();
      addGeomToGroup(group, geom, '#5cc8c0');
      group.addTo(map);
      layerRef.current = group;
      const b = group.getBounds();
      if (b.isValid()) map.fitBounds(b, { padding: [30, 30], maxZoom: 15 });
    } catch {}
  }, [parsed, mode, fromCrs, originX, originY, applyOrigin]);

  return (
    <div className="split conv-split">
      <aside className="side">
        <div className="conv-mode-bar">
          <div className="conv-mode-label">Conversion mode</div>
          <div className="conv-mode-picker">
            <button className={`conv-mode-btn ${mode === 'format' ? 'active' : ''}`} onClick={() => setMode('format')}>
              <div className="conv-mode-title"><Icon name="file" size={12} /> Format</div>
              <div className="conv-mode-desc">GeoJSON ↔ WKT</div>
            </button>
            <button className={`conv-mode-btn ${mode === 'crs' ? 'active' : ''}`} onClick={() => setMode('crs')}>
              <div className="conv-mode-title"><Icon name="globe" size={12} /> CRS</div>
              <div className="conv-mode-desc">Reproject coordinates</div>
            </button>
          </div>
        </div>

        <div className="conv-side-body">
          <div className="conv-field">
            <div className="conv-field-head">
              <label>Input{mode === 'crs' ? ' · Source CRS' : ''}</label>
              {mode === 'crs' && (
                <select className="crs-select sm" value={fromCrs} onChange={(e) => setFromCrs(e.target.value)}>
                  <optgroup label="Common">
                    {CRS_PRESETS.map(p => <option key={p.id} value={p.id}>{p.id} — {p.label}</option>)}
                  </optgroup>
                  <optgroup label="UTM Zones">
                    {CRS_PRESETS_UTM_NS.map(p => <option key={p.id} value={p.proj}>{p.label}</option>)}
                  </optgroup>
                </select>
              )}
            </div>
            <textarea
              className="geom-input"
              style={{ width: '100%', minHeight: 180, borderRadius: 6, border: '1px solid var(--border-soft)', background: 'var(--bg-input)' }}
              value={input}
              onChange={(e) => setInput(e.target.value)}
              placeholder="Paste GeoJSON or WKT…"
              spellCheck={false}
            />
            <div className="conv-parse-status">
              {parsed.ok ? <span style={{ color: 'var(--success)' }}>{parsed.format} · {parsed.geom.type} · {geomStats(parsed.geom).vertices} pts</span>
                         : <span style={{ color: 'var(--danger)' }}>⚠ {parsed.error || 'empty'}</span>}
            </div>
          </div>

          {mode === 'crs' && (
            <div className="conv-field">
              <div className="conv-field-head">
                <label>Target CRS</label>
                <button className="btn sm ghost" onClick={swap} title="Swap from/to" style={{ padding: '2px 8px', fontSize: 11 }}>⇄ Swap</button>
              </div>
              <select className="crs-select block" value={toCrs} onChange={(e) => setToCrs(e.target.value)}>
                <optgroup label="Common">
                  {CRS_PRESETS.map(p => <option key={p.id} value={p.id}>{p.id} — {p.label}</option>)}
                </optgroup>
                <optgroup label="UTM Zones">
                  {CRS_PRESETS_UTM_NS.map(p => <option key={p.id} value={p.proj}>{p.label}</option>)}
                </optgroup>
              </select>
            </div>
          )}

          {mode === 'crs' && utmInvolved && (
            <div className="conv-field">
              <div className="conv-field-head">
                <label>Origin offset</label>
                <span className="conv-badge">UTM</span>
              </div>
              <div className="conv-row">
                <label>Mode</label>
                <div className="opt">
                  <button className={applyOrigin === 'none' ? 'active' : ''} onClick={() => setApplyOrigin('none')}>None</button>
                  <button className={applyOrigin === 'after' ? 'active' : ''} onClick={() => setApplyOrigin('after')}>Subtract after</button>
                  <button className={applyOrigin === 'before' ? 'active' : ''} onClick={() => setApplyOrigin('before')}>Add before</button>
                </div>
              </div>
              {applyOrigin !== 'none' && (
                <>
                  <div className="conv-row">
                    <label>originX</label>
                    <input type="number" value={originX} onChange={(e) => setOriginX(e.target.value)} step="0.0001" />
                  </div>
                  <div className="conv-row">
                    <label>originY</label>
                    <input type="number" value={originY} onChange={(e) => setOriginY(e.target.value)} step="0.0001" />
                  </div>
                  <div className="conv-hint">
                    {applyOrigin === 'after'
                      ? 'output = projected − origin (local coords)'
                      : 'input coords are offsets; absolute = input + origin'}
                  </div>
                </>
              )}
            </div>
          )}
        </div>
      </aside>

      <div className="conv-main">
        <div className="conv-output-bar">
          <div className="conv-output-label">
            <Icon name="arrow-right" size={12} /> <span>Output</span>
            {mode === 'crs' && <span className="conv-crs-pill">{crsShort(toCrs)}</span>}
          </div>
          <div className="conv-output-format">
            <span className="conv-format-label">Format</span>
            <div className="seg">
              <button className={outFormat === 'GeoJSON' ? 'active' : ''} onClick={() => setOutFormat('GeoJSON')}>GeoJSON</button>
              <button className={outFormat === 'WKT' ? 'active' : ''} onClick={() => setOutFormat('WKT')}>WKT</button>
            </div>
          </div>
        </div>
        <div className="conv-output-wrap">
          <textarea
            className="geom-input"
            style={{ width: '100%', height: '100%', minHeight: 220, border: 'none', background: 'var(--bg-input)' }}
            value={result.ok ? result.text : `// Error: ${result.error}`}
            readOnly
            spellCheck={false}
          />
          {result.ok && (
            <button
              className="copy-btn" style={{ top: 10, right: 14 }}
              onClick={() => { try { navigator.clipboard.writeText(result.text); setCopied(true); setTimeout(() => setCopied(false), 1200); } catch {} }}
              title={copied ? 'Copied!' : 'Copy'}
            >
              <Icon name={copied ? 'check' : 'copy'} size={12} />
            </button>
          )}
        </div>
        <div className="conv-map-wrap">
          <div className="conv-map-title">Preview · input reprojected to WGS84</div>
          <div className="conv-map-inner">
            <div ref={containerRef} style={{ position: 'absolute', inset: 0 }} />
          </div>
        </div>
      </div>
    </div>
  );
}

/* ==================== App Shell ==================== */
const ThemeCtx = React.createContext({ theme: 'light', setTheme: () => {} });

function AppShell({ tab, setTab, rightMeta }) {
  const { theme, setTheme } = React.useContext(ThemeCtx);
  const tabDef = tab === 'visualizer'
    ? { title: 'Visualizer', sub: 'Layer-based geometry viewer & editor' }
    : { title: 'Converter',  sub: 'Transform format & coordinate systems' };
  return (
    <div className="app-header">
      <div className="header-row">
        <div className="brand">
          <div className="brand-mark" />
          <span>GeoTools</span>
          <span className="brand-sub">{tabDef.sub}</span>
        </div>
        <div className="header-right">
          {rightMeta && <div className="header-meta">{rightMeta}</div>}
          <div className="theme-toggle" title="Theme">
            {['light','dark','auto'].map(t => (
              <button key={t} className={theme === t ? 'active' : ''} onClick={() => setTheme(t)}>
                <Icon name={t === 'light' ? 'sun' : t === 'dark' ? 'moon' : 'auto'} size={12} />
              </button>
            ))}
          </div>
        </div>
      </div>
      <div className="header-row tabs-row">
        <div className="tabs">
          <button className={`tab ${tab === 'visualizer' ? 'active' : ''}`} onClick={() => setTab('visualizer')}>Visualizer</button>
          <button className={`tab ${tab === 'converter' ? 'active' : ''}`} onClick={() => setTab('converter')}>Converter</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState(() => {
    try { return localStorage.getItem('geotools.tab') || 'visualizer'; } catch { return 'visualizer'; }
  });
  useEffect(() => { try { localStorage.setItem('geotools.tab', tab); } catch {} }, [tab]);

  const [theme, setTheme] = useState(TWEAKS.theme || 'light');
  useEffect(() => {
    const mq = window.matchMedia('(prefers-color-scheme: dark)');
    const apply = () => {
      const resolved = theme === 'auto' ? (mq.matches ? 'dark' : 'light') : theme;
      document.documentElement.setAttribute('data-theme', resolved);
    };
    apply();
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { theme } }, '*'); } catch {}
    if (theme === 'auto') { mq.addEventListener('change', apply); return () => mq.removeEventListener('change', apply); }
  }, [theme]);

  return (
    <ThemeCtx.Provider value={{ theme, setTheme }}>
      {tab === 'visualizer'
        ? <Visualizer tab={tab} setTab={setTab} />
        : <ConverterShell tab={tab} setTab={setTab} />}
    </ThemeCtx.Provider>
  );
}

function ConverterShell({ tab, setTab }) {
  return (
    <>
      <AppShell tab={tab} setTab={setTab} />
      <Converter />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
